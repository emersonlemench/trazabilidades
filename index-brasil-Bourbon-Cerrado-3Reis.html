<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/svg+xml" href="Favicon R rubio.svg">
<title>Rubio Coffee Roasters</title>

<style>
:root{
  --verde:#2f5d50;
  --verde-claro:#3e7a6a;
  --beige:#f4efe9;
  --texto:#2b2b2b;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family: Arial, Helvetica, sans-serif;
  background: var(--verde);
}

.hide{ display:none; }

.flag{
  width:60px;
  border-radius:4px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background: var(--beige);
  border-radius:16px;
  padding:20px;
  border:2px solid var(--verde-claro);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  max-width:200px;
  width:100%;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.info p{ font-size:14px; margin-bottom:5px; }

h2{
  margin:15px 0 8px;
  font-size:16px;
  color:var(--verde);
}

.score-big{
  font-size:26px;
  font-weight:bold;
  color:var(--verde);
}

.scores{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.breakdown p{ font-size:13px; }

canvas{
  width:100%;
}


@media(max-width:768px){
  .grid{ grid-template-columns:1fr; }
}
</style>
</head>

<script>
const data = {
  origin: "Brasil",
  region: "Cerrado Mineiro",
  variety: "Bourbon",
  altitude: "1100 msnm",
  process: "Natural",
  notes: "caramelo, avellana, manzana, cuerpo alto",
  scores:{
  puntaje: 84.75,
    attributes:{
      aroma: 7.75,
      flavour: 7.75,
      aftertaste: 7.75,
      acidity: 7.75,
      body: 8,
      balance: 8,
      overall: 7.75,
      uniformity: 10,
      cleanCup: 10,
      sweetness: 10
    }
  }
};

// etiquetas bonitas
const labelsMap = {
  aroma: "Fragancia/Aroma",
  flavour: "Sabor",
  aftertaste: "Retrogusto",
  acidity: "Acidez",
  body: "Cuerpo",
  balance: "Balance",
  overall: "General",
  uniformity: "Uniformidad",
  cleanCup: "Taza limpia",
  sweetness: "Dulzor"
};

// textos
document.getElementById("origin").textContent = data.origin;
document.getElementById("region").textContent = data.region;
document.getElementById("variety").textContent = data.variety;
document.getElementById("altitude").textContent = data.altitude;
document.getElementById("process").textContent = data.process;
document.getElementById("notes").textContent = data.notes;
document.getElementById("score").textContent = data.scores.puntaje;

// breakdown
const breakdown = document.getElementById("breakdown");
Object.entries(data.scores.attributes).forEach(([k,v])=>{
  const p=document.createElement("p");
  p.innerHTML=`${labelsMap[k] || k}: ${v}`;
  breakdown.appendChild(p);
});

// canvas radar
const canvas=document.getElementById("radar");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetWidth;
}

function draw(){
  resize();

  const labels=Object.keys(data.scores.attributes);
  const displayLabels=labels.map(l=>labelsMap[l]||l);
  const values=Object.values(data.scores.attributes);

  const cx=canvas.width/2;
  const cy=canvas.height/2;
  const radius=canvas.width*0.28;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.font=`${canvas.width*0.03}px Arial`;
  ctx.fillStyle="#2f5d50";
  ctx.textAlign="center";
  ctx.textBaseline="middle";

  // grid
  for(let s=1;s<=5;s++){
    ctx.beginPath();
    labels.forEach((_,i)=>{
      const a=(Math.PI*2/labels.length)*i;
      const r=radius*(s/5);
      const x=cx+r*Math.sin(a);
      const y=cy-r*Math.cos(a);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.strokeStyle="#ddd";
    ctx.stroke();
  }

  // ejes + texto
  labels.forEach((label,i)=>{
    const a=(Math.PI*2/labels.length)*i;

    const x=cx+radius*Math.sin(a);
    const y=cy-radius*Math.cos(a);

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(x,y);
    ctx.strokeStyle="#ccc";
    ctx.stroke();

    const lx=cx+(radius+20)*Math.sin(a);
    const ly=cy-(radius+20)*Math.cos(a);

    ctx.fillText(displayLabels[i], lx, ly);
  });

  // data
  ctx.beginPath();
  values.forEach((v,i)=>{
    const a=(Math.PI*2/labels.length)*i;
    const r=(v/10)*radius;
    const x=cx+r*Math.sin(a);
    const y=cy-r*Math.cos(a);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();

  ctx.fillStyle="rgba(47,93,80,0.3)";
  ctx.fill();
  ctx.strokeStyle="#2f5d50";
  ctx.lineWidth=2;
  ctx.stroke();
}

window.addEventListener("resize",draw);
draw();
</script>
